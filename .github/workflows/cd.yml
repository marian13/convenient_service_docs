##
# CD using GitHub Actions.
#
# NOTE: GitHub Actions DSL.
# - https://docs.github.com/en/actions/learn-github-actions/understanding-github-actions#understanding-the-workflow-file
# - https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
#
# NOTE: How to deploy to GitHub Pages using GitHub Actions?
# - https://github.com/marketplace/actions/github-pages-action
#
# NOTE: How to deploy Docusaurus to GitHub Pages using GitHub Actions?
# https://docusaurus.io/docs/deployment#deploying-to-github-pages
#
name: CD

on:
  push:
    branches:
      - main

##
# NOTE: Copied with almost no modifications from:
# https://docusaurus.io/docs/deployment#deploying-to-github-pages
#
jobs:
  deploy:
    runs-on: ubuntu-24.04
    name: Deploy
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 20.17.0
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version-file: comprehensive_docs/.tool-versions
          bundler-cache: true
          working-directory: comprehensive_docs
      - name: Install dependencies
        ##
        # https://classic.yarnpkg.com/lang/en/docs/cli/install/#toc-yarn-install-frozen-lockfile
        #
        run: |
          (cd docusaurus && yarn install --frozen-lockfile)
          (cd fumadocs/convenient_service_docs && yarn install  --frozen-lockfile)
      - name: Build website
        run: |
          (cd docusaurus && yarn build && mv ./build ../build)
          (cd fumadocs/convenient_service_docs && HOST='https://userdocs.convenientservice.org' yarn build && mv ./build/v1 ../../build/v1)
          (cd comprehensive_docs && bundle exec ruby lib/cs_docs/builder.rb && mv ./dist/comprehensive_docs ../build/comprehensive_docs)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          ##
          # NOTE: Build output to publish to the `gh-pages` branch.
          #
          publish_dir: ./build
          cname: userdocs.convenientservice.org
