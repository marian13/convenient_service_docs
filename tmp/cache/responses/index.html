<html lang="en">
<head>

  <script src="/global/loaders/beforePageLoadStarted.js"></script>

  <style>

    @import "/components/generic/Loader/styles.css";
    @import "/components/generic/LoaderPulse/styles.css";

        "classnames": "https://esm.sh/classnames@2",
        "@utils/env": "/utils/env.js",
        "@utils/html": "/utils/html.js",

        "@utils/theme": "/utils/theme.js",

<body>
  <main class="cs-pages-home">

  <p class="cs-pages-home__logo">

  </p>

  <p class="cs-pages-home__description">Hide technical details with Configs and Middlewares.</p>
  <p class="cs-pages-home__description">Group related code by Features with Entries.</p>

  <div class="cs-pages-home__actions">
    <a class="cs-button cs-button--secondary" href="/docs/tldr" target="_self" rel="">TL;DR</a>

    <a class="cs-button cs-button--secondary" href="/docs/basics.html" target="_self" rel="">User Docs</a>

    <a class="cs-button cs-button--secondary" href="https://apidocs.convenientservice.org" target="_blank" rel="noopener noreferrer">API Docs</a>

    <a class="cs-button cs-button--secondary" href="https://github.com/marian13/convenient_service" target="_blank" rel="noopener noreferrer">GitHub</a>

  </div>

  <div class="cs-pages-home__controls">
    <cs-react-island component="ThemeSelector" props='{"placement":"top"}'></cs-react-island>
    <cs-react-island component="ColorSchemeToggle"></cs-react-island>
  </div>
</main>


  <script type="module" src="/global/loaders/afterPageLoadFinished.js"></script>
